version: "3.9"

services:
  # Base de datos (PostgreSQL)
  db:
    image: postgres:16-alpine
    container_name: fintech-db
    environment:
      POSTGRES_DB: fintech_db
      POSTGRES_USER: fintech_user
      POSTGRES_PASSWORD: fintech_pass123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fintech-network

  # Backend (Node.js / Express)
  backend:
    build:
      context: ./backend
    container_name: fintech-backend
    environment:
      PORT: 3001
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: fintech_db
      DB_USER: fintech_user
      DB_PASSWORD: fintech_pass123
    ports:
      - "3001:3001"
    depends_on:
      - db
    networks:
      - fintech-network
    restart: always

  # Frontend (React)
  frontend:
    build:
      context: ./frontend
    container_name: fintech-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - fintech-network

# Volumen
volumes:
  postgres_data:

# Red
networks:
  fintech-network:
    driver: bridge
